name: Deploy to 20i

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ── 1. Build & validate ──────────────────────────────
  build:
    name: Build & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build API
        run: npm run build --workspace=apps/api

      - name: Build web
        run: npm run build --workspace=apps/web
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
          NEXT_PUBLIC_APP_BASE_URL: ${{ secrets.NEXT_PUBLIC_APP_BASE_URL }}

  # ── 2. Deploy to 20i VPS ─────────────────────────────
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add server to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
        run: |
          ssh $VPS_USER@$VPS_HOST << 'ENDSSH'
            set -e
            cd $DEPLOY_PATH

            echo "── Pulling latest code ──"
            git pull origin main

            echo "── Writing production env ──"
            cat > .env << 'EOF'
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          ADMIN_API_KEY=${{ secrets.ADMIN_API_KEY }}
          CALCOM_API_KEY=${{ secrets.CALCOM_API_KEY }}
          CALCOM_BASE_URL=https://api.cal.com/v2
          OLLAMA_BASE_URL=http://ollama:11434
          OLLAMA_MODEL=llama3
          NOTIFY_EMAIL=${{ secrets.NOTIFY_EMAIL }}
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASS=${{ secrets.SMTP_PASS }}
          SMTP_FROM=${{ secrets.SMTP_FROM }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_PLACES_API_KEY=${{ secrets.GOOGLE_PLACES_API_KEY }}
          GOOGLE_PLACE_ID=${{ secrets.GOOGLE_PLACE_ID }}
          FACEBOOK_PAGE_ID=${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_TOKEN=${{ secrets.FACEBOOK_PAGE_TOKEN }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          WP_DB_PASSWORD=${{ secrets.WP_DB_PASSWORD }}
          WP_DB_ROOT_PASSWORD=${{ secrets.WP_DB_ROOT_PASSWORD }}
          NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
          NEXT_PUBLIC_APP_BASE_URL=${{ secrets.NEXT_PUBLIC_APP_BASE_URL }}
          NEXT_PUBLIC_CAL_BOOKING_URL=${{ secrets.NEXT_PUBLIC_CAL_BOOKING_URL }}
          EOF

            cat > apps/web/.env.local << 'EOF'
          API_BASE_URL=http://api:4000
          NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
          NEXT_PUBLIC_APP_BASE_URL=${{ secrets.NEXT_PUBLIC_APP_BASE_URL }}
          NEXT_PUBLIC_CAL_BOOKING_URL=${{ secrets.NEXT_PUBLIC_CAL_BOOKING_URL }}
          ADMIN_API_KEY=${{ secrets.ADMIN_API_KEY }}
          WORDPRESS_URL=http://wordpress:80
          EOF

            echo "── Building & starting containers ──"
            docker compose -f docker-compose.prod.yml build --parallel
            docker compose -f docker-compose.prod.yml up -d

            echo "── Pruning unused images ──"
            docker image prune -f

            echo "── Health check ──"
            sleep 10
            curl -sf http://localhost:4000/health && echo " API OK" || echo " API not yet ready"
            curl -sf http://localhost:3000 && echo " Web OK" || echo " Web not yet ready"
          ENDSSH

      - name: Notify success
        if: success()
        run: echo "✅ Deployed to production at ${{ secrets.NEXT_PUBLIC_APP_BASE_URL }}"

      - name: Notify failure
        if: failure()
        run: echo "❌ Deployment failed — check the logs above"
