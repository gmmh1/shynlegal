# ── HTTP → HTTPS redirect ─────────────────────────────
server {
    listen 80;
    server_name shynlegal.co.uk www.shynlegal.co.uk admin.shynlegal.co.uk;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Main website (Next.js) ────────────────────────────
server {
    listen 443 ssl;
    server_name shynlegal.co.uk www.shynlegal.co.uk;

    ssl_certificate     /etc/letsencrypt/live/shynlegal.co.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shynlegal.co.uk/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass         http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Next.js static assets — long cache
    location /_next/static/ {
        proxy_pass http://web:3000/_next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# ── WordPress admin ───────────────────────────────────
server {
    listen 443 ssl;
    server_name admin.shynlegal.co.uk;

    ssl_certificate     /etc/letsencrypt/live/shynlegal.co.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shynlegal.co.uk/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass         http://wordpress:80;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
